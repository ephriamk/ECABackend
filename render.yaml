# render.yaml

services:
  - name: fastapi-backend
    type: service
    env: python
    plan: free
    region: oregon
    branch: master
    repo: https://github.com/<your-user>/<your-repo>.git
    path: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

staticSites:
  - name: react-frontend
    type: static_site
    env: static
    plan: free
    region: oregon
    branch: master
    repo: https://github.com/<your-user>/<your-repo>.git
    path: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build    # or "dist" if you’re using Vite configured that way
