# render.yaml
services:
  - type: web_service
    name: fastapi-backend
    env: python
    plan: free
    region: oregon
    branch: master
    repo: https://github.com/<your-user>/<your-repo>.git
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    path: backend

  - type: static_site
    name: react-frontend
    env: static
    plan: free
    region: oregon
    branch: master
    repo: https://github.com/<your-user>/<your-repo>.git
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist   # or "frontend/build" if CRA
